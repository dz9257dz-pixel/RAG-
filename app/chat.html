<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG 知识库</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: system-ui; background: linear-gradient(135deg,#667eea,#764ba2); height:100vh; display:flex; align-items:center; justify-content:center; }
        .container { width:800px; max-width:90vw; height:700px; max-height:90vh; background:white; border-radius:20px; box-shadow:0 20px 60px rgba(0,0,0,0.3); display:flex; flex-direction:column; overflow:hidden; }
        .header { background:linear-gradient(135deg,#667eea,#764ba2); color:white; padding:20px 24px; }
        .header h1 { font-size:20px; }
        .header p { font-size:13px; opacity:0.8; }
        .chat-box { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:16px; }
        .message { max-width:85%; padding:12px 16px; border-radius:12px; line-height:1.6; font-size:14px; animation:fade .3s; }
        @keyframes fade { from{opacity:0;transform:translateY(10px)} to{opacity:1} }
        .user-msg { background:#667eea; color:white; align-self:flex-end; border-bottom-right-radius:4px; }
        .bot-msg { background:#f0f0f0; color:#333; align-self:flex-start; border-bottom-left-radius:4px; }
        .bot-msg pre { background:#e0e0e0; padding:8px; border-radius:4px; overflow-x:auto; font-size:12px; }
        .bot-msg code { background:#e0e0e0; padding:2px 4px; border-radius:3px; font-size:12px; }
        .input-area { display:flex; gap:10px; padding:16px 20px; border-top:1px solid #eee; background:#fafafa; }
        .input-area input { flex:1; padding:12px 16px; border:2px solid #e0e0e0; border-radius:25px; outline:none; font-size:14px; }
        .input-area input:focus { border-color:#667eea; }
        .input-area button { padding:12px 24px; background:linear-gradient(135deg,#667eea,#764ba2); color:white; border:none; border-radius:25px; cursor:pointer; font-size:14px; }
        .input-area button:hover { opacity:.9; }
        .input-area button:disabled { opacity:.5; cursor:not-allowed; }
        .loading { align-self:center; color:#999; font-size:13px; }
        .empty-state { flex:1; display:flex; align-items:center; justify-content:center; color:#bbb; text-align:center; }
        .empty-state span { font-size:48px; display:block; margin-bottom:12px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header"><h1>📚 RAG 知识库助手</h1><p>基于 FastAPI + BGE 向量检索</p></div>
    <div class="chat-box" id="chatBox">
        <div class="empty-state" id="emptyState"><div><span>🤖</span>输入你的问题，开始检索知识库</div></div>
    </div>
    <div class="input-area">
        <input type="text" id="queryInput" placeholder="输入你的问题..." onkeydown="if(event.key=='Enter') send()">
        <button id="sendBtn" onclick="send()">发送</button>
    </div>
</div>
<script>
async function send() {
    const inp = document.getElementById('queryInput');
    const q = inp.value.trim();
    if (!q) return;
    
    document.getElementById('emptyState')?.remove();
    addMsg(q, 'user');
    inp.value = '';
    
    const loadingDiv = document.createElement('div');
    loadingDiv.className = 'message loading';
    loadingDiv.textContent = '⏳ 检索中...';
    document.getElementById('chatBox').appendChild(loadingDiv);
    document.getElementById('sendBtn').disabled = true;
    
    try {
        const r = await fetch('/v1/chat', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({query: q, top_k: 3, use_llm: false})
        });
        loadingDiv.remove();
        
        const d = await r.json();
        
        // 显示回答（如果有大模型回答就显示回答，否则显示检索片段）
        let reply = '';
        if (d.answer) {
            reply = d.answer;
        } else {
            reply = '📖 找到 ' + d.retrieved_contexts.length + ' 条相关内容：\n\n';
            d.retrieved_contexts.forEach((doc, i) => {
                reply += '**来源 ' + (i+1) + '**\n' + doc.substring(0, 300) + '\n\n';
            });
        }
        addMsg(reply, 'bot');
        
    } catch(e) {
        loadingDiv.remove();
        addMsg('❌ 错误: ' + e.message, 'bot');
    } finally {
        document.getElementById('sendBtn').disabled = false;
    }
}

function addMsg(text, type) {
    const box = document.getElementById('chatBox');
    const div = document.createElement('div');
    div.className = 'message ' + (type === 'user' ? 'user-msg' : 'bot-msg');
    
    if (type === 'bot') {
        // 简单 Markdown 渲染
        let html = text
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
            .replace(/\n/g, '<br>')
            .replace(/```(.*?)```/gs, '<pre><code>$1</code></pre>');
        div.innerHTML = html;
    } else {
        div.textContent = text;
    }
    
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
}
</script>
</body>
</html>
